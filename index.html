<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Question Generator</title>
    <link rel="stylesheet" href="/shecodes/style.css">
</head>
<body>
<div class="container">
    <h1>Question Generator</h1>

    <form action="/generate" method="post">
        <div>
            <label for="subject">Subject</label>
            <input type="text" name="subject" id="subject" placeholder="e.g Mathematics" required>
        </div>
        <div>
            <label for="topic">Topic</label>
            <input type="text" name="topic" id="topic" placeholder="e.g. Quadratic Equations" required>
        </div>
        <div>
            <label for="num_questions">Number of Question</label>
            <input type="number" name="num_questions" id="num_questions" min="1" max="20" value="5" required>
        </div>


        <div>
            <label for="subject":></label><br/>
            <select id="subject" name="subject" required>
                <option value="" dissabled selected>---Choose a subject ---</option>
                <option value="math">Mathematics</option>
                <option value="english">English</option>
                <option value="science">Science</option>
                <option value="history">History</option>
                <option value="geography">Geography</option>
                <option value="biology">Biology</option>
                <option value="astronomy">Astronomy</option>
            </select>
        </div>

        <button type="submit">Generate Questions</button>
    </form>

    <!-- RESULTS -->
    <p class="footer">Build by Rebecca Sunu</p>

</div>
</body>
</html>
